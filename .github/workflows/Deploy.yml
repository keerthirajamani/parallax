name: Build & Deploy Parallax to EC2

on:
  push:
    branches:
      - main
      - feat/*
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}

jobs:
  terraform:
    name: Provision EC2 via Terraform
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve

      - name: Get EC2 IP
        id: tf_output
        working-directory: infra
        run: |
          echo "ec2_ip=$(terraform output -raw elastic_ip)" >> $GITHUB_OUTPUT
          echo "EC2 Name: $(terraform output -raw instance_name)"
          echo "EC2 Elastic IP: $(terraform output -raw elastic_ip)"

  deploy:
    name: Build, Push & Deploy to EC2
    runs-on: ubuntu-latest
    needs: terraform
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build, tag & push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:latest $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "Pushed: latest and $IMAGE_TAG"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REPOSITORY
          script: |
            # Wait for user_data (Docker + Redpanda install) to finish
            until sudo systemctl is-active --quiet docker; do sleep 5; done

            # Ensure ec2-user can run docker without sudo
            sudo usermod -aG docker ec2-user || true

            # Ensure app directory exists
            sudo mkdir -p /app
            sudo chown -R ec2-user:ec2-user /app
            cat > /app/.env << 'ENVEOF'
            ${{ secrets.APP_ENV_FILE }}
            ENVEOF

            # Login to ECR
            aws ecr get-login-password --region $AWS_REGION | \
              sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # Free up disk space before pulling
            docker image prune -f || true

            # Pull latest image
            sudo docker pull ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest

            # Main container
            sudo docker stop parallax || true
            sudo docker rm parallax || true
            sudo docker run -d \
              --name parallax \
              --network host \
              --env-file /app/.env \
              --restart unless-stopped \
              ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest \
              tail -f /dev/null

            # India consumer
            sudo docker stop parallax-consumer-india || true
            sudo docker rm parallax-consumer-india || true
            sudo docker run -d \
              --name parallax-consumer-india \
              --network host \
              --env-file /app/.env \
              --restart unless-stopped \
              ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest \
              python scripts/run.py consumer india

            # US consumer
            sudo docker stop parallax-consumer-us || true
            sudo docker rm parallax-consumer-us || true
            sudo docker run -d \
              --name parallax-consumer-us \
              --network host \
              --env-file /app/.env \
              --restart unless-stopped \
              ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:latest \
              python scripts/run.py consumer us

            # Create log directory
            sudo mkdir -p /var/log/parallax
            sudo chown ec2-user:ec2-user /var/log/parallax

            # Install crontab (idempotent — replaces on every deploy)
            crontab - << 'CRON'
            CRON_TZ=Asia/Kolkata
            10 8,20 * * * sudo docker start parallax
            15 8,20 * * * sudo docker exec parallax python scripts/run.py token_refresh >> /var/log/parallax/token_refresh.log 2>&1
            30 8 * * 1-5 sudo docker exec parallax python scripts/run.py forever_order_update '{"market":"india"}' >> /var/log/parallax/portfolio_update.log 2>&1
            20 9 * * 1-5 sudo docker start parallax-consumer-india
            15 10-15 * * 1-5 sudo docker exec parallax python scripts/run.py signals '{"unit":"hours","interval":1,"entity":"IN_INDEX"}' --place-orders >> /var/log/parallax/in_index_hourly.log 2>&1
            26 15 * * 1-5 sudo docker exec parallax python scripts/run.py signals '{"unit":"days","interval":1,"entity":"IN_EQUITY"}' --place-orders >> /var/log/parallax/nse_daily.log 2>&1
            27 15 * * 1-5 sudo docker exec parallax python scripts/run.py signals '{"unit":"weeks","interval":1,"entity":"IN_EQUITY"}' --place-orders >> /var/log/parallax/nse_weekly.log 2>&1
            05 16 * * 1-5 sudo docker stop parallax-consumer-india parallax
            CRON_TZ=America/New_York
            20 8,20 * * 1-5 sudo docker restart parallax-consumer-us
            54 15 * * 1-5 sudo docker exec parallax python scripts/run.py signals '{"unit":"days","interval":1,"entity":"US_EQUITY"}' --place-orders >> /var/log/parallax/nyse_daily.log 2>&1
            55 15 * * 5 sudo docker exec parallax python scripts/run.py signals '{"unit":"weeks","interval":1,"entity":"US_EQUITY"}' --place-orders >> /var/log/parallax/nyse_weekly.log 2>&1
            CRON

            echo "Deployed successfully"
